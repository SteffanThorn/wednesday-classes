<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INNER LIGHT Email Preview</title>
  <style>
    body {
      margin: 0;
      padding: 32px 16px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #1f2937;
    }

    .frame {
      max-width: 600px;
      margin: 0 auto;
    }

    .note {
      margin: 0 0 16px;
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #ff8a80 0%, #ffcc80 16.66%, #fff9c4 33.33%, #a5d6a7 50%, #81d4fa 66.66%, #9fa8da 83.33%, #ce93d8 100%);
    }

    .header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .header p {
      margin: 10px 0 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
    }

    .content {
      padding: 40px 30px;
    }

    .content h2 {
      margin: 0 0 20px;
      font-size: 24px;
      font-weight: 500;
    }

    .content p {
      margin: 0 0 16px;
      color: #4b5563;
      font-size: 16px;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      padding: 24px 20px 32px;
      color: #9ca3af;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <p class="note">邮件顶部条预览：已改为参考 Innerlight Logo 的青蓝 → 紫色渐变</p>
    <div class="card">
      <div class="header">
        <h1>INNER LIGHT</h1>
        <p>Yoga &amp; Meditation</p>
      </div>
      <div class="content">
        <h2>Booking Confirmed! ✨</h2>
        <p>Hi Yuki,</p>
        <p>这是一个本地预览页，用来查看邮件顶部横条的新品牌配色效果。</p>
        <p>如果你满意，我接着可以帮你发一封测试邮件到你的邮箱，看看在真实邮件客户端里的显示效果。</p>
      </div>
      <div class="footer">
        INNER LIGHT · Auckland, New Zealand
      </div>
    </div>
  </div>
</body>
</html>
